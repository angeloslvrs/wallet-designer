<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Boarding Pass Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>wallet-pass-designer</h1>
      <nav id="view-tabs">
        <button data-view="issue" class="active">Issue</button>
        <button data-view="manage">Manage</button>
        <button data-view="designer">Design (advanced)</button>
      </nav>
      <span id="profile-badge">…</span>
    </header>
    <main hidden>
      <section id="form-pane"></section>
      <section id="preview-pane">
        <nav id="tabs">
          <button data-tab="front" class="active">Front</button>
          <button data-tab="back">Back</button>
          <button data-tab="detail">iOS 26 Detail</button>
        </nav>
        <div id="preview-stage"></div>
        <div id="actions">
          <select id="fixture-picker"><option value="">Load saved design…</option></select>
          <button id="build-btn">Build .pkpass</button>
          <button id="save-tpl-btn" type="button">Save design</button>
          <button id="reset-btn" type="button">Reset</button>
        </div>
        <div id="build-status"></div>
      </section>
    </main>
    <section id="manage-pane" hidden></section>
    <section id="issue-pane"></section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
