<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wallet-pass-designer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>wallet-pass-designer</h1>
      <nav id="view-tabs">
        <button data-view="designer" class="active">Designer</button>
        <button data-view="manage">Manage</button>
      </nav>
      <span id="profile-badge">…</span>
    </header>
    <main>
      <section id="form-pane"></section>
      <section id="preview-pane">
        <nav id="tabs">
          <button data-tab="front" class="active">Front</button>
          <button data-tab="back">Back</button>
          <button data-tab="detail">iOS 26 Detail</button>
        </nav>
        <div id="preview-stage"></div>
        <div id="actions">
          <select id="fixture-picker"><option value="">Load template…</option></select>
          <button id="build-btn">Build .pkpass</button>
          <button id="save-tpl-btn" type="button">Save template</button>
          <button id="reset-btn" type="button">Reset</button>
        </div>
        <div id="build-status"></div>
        <div id="live-controls"></div>
      </section>
    </main>
    <section id="manage-pane" hidden></section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
