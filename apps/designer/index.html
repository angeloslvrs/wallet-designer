<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boarding Pass Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar">
        <div class="wpd-brand">
          <div class="wpd-brand-logo">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M2.5 11.5 21 4 14 22l-3.5-7.5L2.5 11.5Z" fill="#fff"/></svg>
          </div>
          <div class="wpd-brand-text">
            <div class="wpd-brand-name">Boarding Pass Studio</div>
            <div class="wpd-brand-sub">Apple Wallet boarding passes</div>
          </div>
        </div>
        <nav id="view-tabs">
          <button data-view="designer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3Z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5Z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
            <span>Design</span>
          </button>
          <button data-view="issue" class="active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2a2 2 0 0 0 0 6v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-6Z"/><path d="M13 5v2M13 17v2M13 11v2"/></svg>
            <span>Issue</span>
          </button>
          <button data-view="manage">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1.5"/><rect x="3" y="13" width="18" height="5" rx="1.5"/><path d="M7 6.5h.01M7 15.5h.01"/></svg>
            <span>Manage</span>
          </button>
        </nav>
        <div class="wpd-profile"><span id="profile-badge">…</span></div>
      </aside>

      <div id="app-main">
        <main hidden>
          <section id="form-pane"></section>
          <section id="preview-pane">
            <nav id="tabs">
              <button data-tab="front" class="active">Front</button>
              <button data-tab="back">Back</button>
              <button data-tab="detail">iOS 26 detail</button>
            </nav>
            <div id="preview-stage"></div>
            <div id="actions">
              <select id="fixture-picker"><option value="">Load saved design…</option></select>
              <button id="build-btn">Build .pkpass</button>
              <button id="save-tpl-btn" type="button">Save design</button>
              <button id="reset-btn" type="button">Reset</button>
            </div>
            <div id="build-status"></div>
          </section>
        </main>
        <section id="manage-pane" hidden></section>
        <section id="issue-pane"></section>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
