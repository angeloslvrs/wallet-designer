# QA gate: validate our built pass with Apple's own validators
# (the `buildpass` CLI from github.com/apple/pass-builder).
#
# What `buildpass validate` actually checks (verified at the pinned SHA):
#   - it loads an UNCOMPRESSED pass bundle directory — PassPackage(url:)
#     requires a directory, so a zipped .pkpass is not accepted; we unzip the
#     real signed artifact and validate exactly the bytes a device receives
#     (extra manifest.json/signature entries are carried, not rejected)
#   - PassValidator composes: BoardingPassValidator, EventTicketValidator,
#     FieldFormattingValidator, RequiredImagesValidator, SeatValidator
#   - there is NO signature verification in `validate`, so the self-signed
#     dev cert from `npm run init` is a non-issue here
#   - validation errors exit non-zero (ExitCode.validationFailure) → red CI
name: apple-validate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # apple/pass-builder pinned commit (HEAD as of 2026-06-05; pinned 2026-06-11).
  # Bump deliberately — scripts/field-coverage.mjs reads protos at this same SHA.
  PASS_BUILDER_SHA: 170f2a11601712acaa94d4aac3ecb4a2da9675fb

jobs:
  build-pass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # self-signed dev cert + placeholder assets (required before any build)
      - run: npm run init
      - name: Build a pass from EVERY template bundle and unpack it
        # validate only takes an uncompressed directory, so each .pkpass is
        # unzipped into out/passes/<id>.pass
        run: |
          set -e
          for d in templates/*.pkpasstemplate; do
            id=$(basename "$d" .pkpasstemplate)
            node scripts/build-pass.js --template "$id" --serial "CI-$id" --out "out/$id.pkpass"
            mkdir -p "out/passes/$id.pass"
            unzip -o "out/$id.pkpass" -d "out/passes/$id.pass"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: template-passes
          path: out/passes
          # a silently-empty artifact would let validate pass on stale bytes
          if-no-files-found: error

  validate:
    needs: build-pass
    runs-on: ubuntu-latest
    # pass-builder needs Swift >= 6.3 (swift-tools-version); official image, Ubuntu 24.04
    container: swift:6.3-noble
    steps:
      - name: Checkout apple/pass-builder (pinned)
        uses: actions/checkout@v4
        with:
          repository: apple/pass-builder
          ref: ${{ env.PASS_BUILDER_SHA }}
          path: pass-builder
      # First build is slow (SwiftPM cold build); later runs restore .build and
      # finish in seconds. Key on the pinned SHA so a bump rebuilds cleanly.
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: pass-builder/.build
          key: buildpass-${{ runner.os }}-${{ env.PASS_BUILDER_SHA }}
      # Upstream Linux build bug at the pinned SHA: ReadCredential.swift:54
      # passes an optional `ptr.baseAddress` to explicit_bzero on the
      # non-macOS branch and doesn't compile with Swift 6.3 on Linux. The
      # credential code isn't even used by `validate`, but it's in the same
      # executable target. Patch the one line; drop this step when a fixed
      # upstream commit exists and the pin moves past it.
      - name: Patch upstream Linux-only build error (ReadCredential.swift)
        working-directory: pass-builder
        run: |
          sed -i 's/explicit_bzero(ptr.baseAddress, ptr.count)/if let b = ptr.baseAddress { explicit_bzero(b, ptr.count) }/' Sources/buildpass/ReadCredential.swift
          grep -n "explicit_bzero" Sources/buildpass/ReadCredential.swift
      - name: Build buildpass CLI
        working-directory: pass-builder
        run: swift build -c release --product buildpass
      - uses: actions/download-artifact@v4
        with:
          name: template-passes
          path: passes
      - name: buildpass validate (every template's pass)
        run: |
          set -e
          for d in passes/*.pass; do
            echo "== validate $d =="
            pass-builder/.build/release/buildpass validate "$d"
          done
