# Node app regression gate: runs the same checks a dev runs locally
# (unit tests, fixture-schema check, SPA build, and both build paths) so a
# broken pipeline is caught before it reaches apple-validate.yml.
#
# Node 24 matches package.json `engines.node` (">=24") and the prod runtime
# (the store uses built-in node:sqlite, added in Node 24).
name: node-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # self-signed dev cert + placeholder assets (required before any build)
      - run: npm run init
      - run: npm test
      - run: npm run check
      - run: npm run build:designer
      # exercise both stored-pass shapes end-to-end (FormState + template)
      - name: Build a FormState pass
        run: npm run build:pass -- --in fixtures/fully-loaded.json
      - name: Build a template pass
        run: npm run build:pass -- --template dev-sample --serial CI-dev-sample
